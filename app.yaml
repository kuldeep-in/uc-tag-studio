command:
  - uvicorn
  - app:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"

env:
  # ── Primary workspace ────────────────────────────────────────────────────────
  - name: CONFIG_CATALOG
    value: "<catalog-name>"
  - name: CONFIG_SCHEMA
    value: "uc_tag_studio"
  - name: SQL_WAREHOUSE_ID
    value: "<warehouse-id>"

  # ── Secondary metastore region secrets (slots 1–5) ──────────────────────────
  #
  #  All 5 slots are pre-declared so regions can be added/removed via UI with no app.yaml change or redeploy. Unused slots must still have a placeholder secret:
  #   databricks secrets put-secret --scope tag-governance --key sec-N-sp-secret --string-value "placeholder"
  - name: SEC_1_SP_CLIENT_SECRET
    value: "{{secrets/tag-governance/sec-1-sp-secret}}"
  - name: SEC_2_SP_CLIENT_SECRET
    value: "{{secrets/tag-governance/sec-2-sp-secret}}"
  - name: SEC_3_SP_CLIENT_SECRET
    value: "{{secrets/tag-governance/sec-3-sp-secret}}"
  - name: SEC_4_SP_CLIENT_SECRET
    value: "{{secrets/tag-governance/sec-4-sp-secret}}"
  - name: SEC_5_SP_CLIENT_SECRET
    value: "{{secrets/tag-governance/sec-5-sp-secret}}"

resources:
  - name: sql-warehouse
    sql_warehouse:
      id: "<warehouse-id>"
      permission: "CAN_USE"
